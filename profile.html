<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - Tec W Manuais</title>
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
</head>
<body data-page="profile" class="dark">

  <div class="app-layout">
    <!-- Header -->
    <header class="app-header">
      <div class="header-container">
        <div class="brand-wrapper">
          <div class="brand-icon">
            <i data-lucide="cpu" style="color: var(--primary-light); width: 22px; height: 22px;"></i>
          </div>
          <span class="brand-title">Tec W <span style="color: var(--primary-light);">Manuais</span></span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 0.75rem;">
          <span id="header-sub-badge" style="font-size: 0.625rem; font-weight: 800; background-color: var(--primary-transparent); color: white; padding: 0.25rem 0.625rem; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.05em;">FREE</span>
          <div style="width: 32px; height: 32px; border-radius: 50%; background-color: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.8125rem; font-weight: 700; cursor: pointer;">
            <span id="header-user-name">T</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main style="flex: 1; padding-bottom: 5rem;" class="profile-layout-container fade-in">
      <!-- Profile Header / Card -->
      <section class="profile-hero">
        <div class="profile-avatar" id="profile-avatar-letters">TM</div>
        <h2 class="profile-name" id="profile-user-name">Técnico Master</h2>
        <p style="font-size: 0.8125rem; color: var(--text-muted); margin-bottom: 0.75rem;" id="profile-user-email">tecnico@tecw.com.br</p>
        <span class="profile-badge" id="profile-status-badge">Membro Gratuito</span>
      </section>

      <!-- Stats section -->
      <section class="profile-stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="stat-views-val">0</span>
            <span class="stat-label">Lidos</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-downloads-val">0</span>
            <span class="stat-label">Offline</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-favs-val">0</span>
            <span class="stat-label">Favoritos</span>
          </div>
        </div>

        <!-- Premium promotional pitch for free users -->
        <div id="profile-upgrade-offer" class="container-box fade-in" style="padding: 0 1.5rem; margin-top: 2rem; display: none;">
          <div style="background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; align-items: center; text-align: center;">
            <div style="width: 44px; height: 44px; border-radius: 50%; background-color: rgba(255,102,0,0.1); color: var(--accent-color); display: flex; align-items: center; justify-content: center;">
              <i data-lucide="award" style="width: 24px; height: 24px;"></i>
            </div>
            <div>
              <h3 style="font-size: 1.125rem; font-weight: 800; color: var(--text-color); margin-bottom: 0.25rem;">Torne-se um Técnico Parceiro PRO</h3>
              <p style="font-size: 0.8125rem; color: var(--text-muted); max-width: 360px; line-height: 1.5;">Ative sua conta e tenha acesso a esquemas elétricos oficiais e autotestes em campo de alta velocidade.</p>
            </div>
            <button id="profile-activate-btn" class="btn btn-primary" style="padding: 0.75rem 2rem; border-radius: 12px; font-size: 0.8125rem;">Ativar Biblioteca PRO</button>
          </div>
        </div>

        <!-- Utility buttons (Logout) -->
        <div style="max-width: 600px; margin: 2rem auto; padding: 0 1.5rem;">
          <button id="logout-trigger" class="btn btn-secondary" style="width: 100%; border-radius: 16px; color: #EF4444; border-color: rgba(239, 68, 68, 0.2); justify-content: center; gap: 0.5rem; padding: 1rem;">
            <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
            <span>Encerrar Sessão Técnica</span>
          </button>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <button class="nav-item" data-target="home">
        <div class="nav-icon-wrapper">
          <i data-lucide="home" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Início</span>
      </button>
      <button class="nav-item" data-target="search">
        <div class="nav-icon-wrapper">
          <i data-lucide="search" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Buscar</span>
      </button>
      <button class="nav-item" data-target="favorites">
        <div class="nav-icon-wrapper">
          <i data-lucide="heart" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Favoritos</span>
      </button>
      <button class="nav-item" data-target="profile">
        <div class="nav-icon-wrapper">
          <i data-lucide="user" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Perfil</span>
      </button>
      <button class="nav-item" data-target="settings">
        <div class="nav-icon-wrapper">
          <i data-lucide="settings" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Ajustes</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
