<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar - Tec W Manuais</title>
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
</head>
<body data-page="search" class="dark">

  <div class="app-layout">
    <!-- Header -->
    <header class="app-header">
      <div class="header-container">
        <div class="brand-wrapper">
          <div class="brand-icon">
            <i data-lucide="cpu" style="color: var(--primary-light); width: 22px; height: 22px;"></i>
          </div>
          <span class="brand-title">Tec W <span style="color: var(--primary-light);">Manuais</span></span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 0.75rem;">
          <span id="header-sub-badge" style="font-size: 0.625rem; font-weight: 800; background-color: var(--primary-transparent); color: white; padding: 0.25rem 0.625rem; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.05em;">FREE</span>
          <div style="width: 32px; height: 32px; border-radius: 50%; background-color: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.8125rem; font-weight: 700; cursor: pointer;" onclick="window.location.href='profile.html'">
            <span id="header-user-name">T</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main style="flex: 1; padding: 1.5rem 0 5rem;">
      <section class="container-box fade-in" style="padding: 0 1.5rem; margin-bottom: 1.5rem;">
        <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem; color: var(--text-color);">Buscar Manuais</h1>
        <p style="font-size: 0.8125rem; color: var(--text-muted);">Encontre diagramas, placas ou marcas específicas em segundos.</p>
      </section>

      <!-- Advanced filter bar -->
      <section class="container-box fade-in" style="padding: 0 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
        <!-- Search and brand input row -->
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 0.75rem;">
          <div class="input-container" style="flex: 1;">
            <i class="input-icon" data-lucide="search"></i>
            <input type="text" id="search-input" class="input-field" placeholder="Busque por modelo, termo, placa, sensor..." style="padding-top: 0.75rem; padding-bottom: 0.75rem;" />
          </div>
          
          <div class="input-container">
            <select id="brand-filter-select" class="input-field" style="padding-left: 1rem; padding-top: 0.75rem; padding-bottom: 0.75rem; border-radius: 14px; cursor: pointer;">
              <option value="all">Todas as Marcas</option>
              <!-- Populated dynamically -->
            </select>
          </div>
        </div>

        <!-- Horizontal category chip filter slider -->
        <div id="categories-chips-wrapper" class="category-container" style="margin: 0.25rem -1.5rem; padding-inline: 1.5rem;">
          <!-- Populated dynamically with category-chips -->
        </div>

        <!-- Count indicator -->
        <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem; margin-top: 0.5rem;">
          <span id="result-count-indicator" style="font-size: 0.6875rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary-light);">
            Carregando catálogo...
          </span>
        </div>
      </section>

      <!-- Search results grid -->
      <section class="container-box fade-in">
        <div id="search-results-grid" class="manuals-grid">
          <!-- Populated dynamically -->
        </div>
      </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <button class="nav-item" data-target="home">
        <div class="nav-icon-wrapper">
          <i data-lucide="home" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Início</span>
      </button>
      <button class="nav-item" data-target="search">
        <div class="nav-icon-wrapper">
          <i data-lucide="search" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Buscar</span>
      </button>
      <button class="nav-item" data-target="favorites">
        <div class="nav-icon-wrapper">
          <i data-lucide="heart" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Favoritos</span>
      </button>
      <button class="nav-item" data-target="profile">
        <div class="nav-icon-wrapper">
          <i data-lucide="user" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Perfil</span>
      </button>
      <button class="nav-item" data-target="settings">
        <div class="nav-icon-wrapper">
          <i data-lucide="settings" style="width: 20px; height: 20px;"></i>
        </div>
        <span>Ajustes</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
